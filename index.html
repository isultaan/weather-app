<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="search">
      <input type="text" id="city" placeholder="Enter city name" spellcheck="false" aria-label="Search for a city">
      <button id="searchBtn" aria-label="Search">
        🔍
      </button>
    </div>

    <div class="error" id="error" aria-live="polite" aria-atomic="true">
    </div>

    <div class="weather" id="weather" style="display: none;">
      <img src="images/icons8-clear-sky-64.png" class="weather-icon" id="icon" alt="Weather icon">

      <h1 class="temp" id="temp"></h1>
      <h2 class="city" id="cityName"></h2>

      <div class="details">
        <div class="col">
          <img src="images/humidity.png" alt="Humidity icon">
          <div>
            <p class="humidity" id="humidity"></p>
            <p>Humidity</p>
          </div>
        </div>

        <div class="col">
          <img src="images/wind.jpg" alt="Wind speed icon">
          <div>
            <p class="wind" id="wind"></p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
